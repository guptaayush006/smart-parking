{% extends "base.html" %}

{% block content %}
<div class="form-container"
    style="max-width: 600px; margin: 4rem auto; padding: 3rem; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 16px; animation: fadeInUp 0.5s ease-out;">

    <div style="text-align: center; margin-bottom: 3rem;">
        <img src="https://api.dicebear.com/7.x/initials/svg?seed={{ user.name }}&backgroundColor=10b981"
            style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); padding: 5px; margin-bottom: 1rem; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);">
        <h2 style="font-size: 2.2rem; color: white;">My <span style="color: var(--primary);">Profile</span></h2>
        <p style="color: var(--text-muted); font-size: 1rem; margin-top: 0.5rem;">Manage your personal account details
        </p>
    </div>

    <!-- Dynamic Error/Success messages -->
    <div id="profile-msg-box"
        style="display: none; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; text-align: center; border: 1px solid transparent; font-weight: 600;">
    </div>

    <form action="/api/update_profile" method="POST">
        <div class="form-group">
            <label style="color: var(--text-muted);"><i class="fa-solid fa-user"></i> Full Name</label>
            <input type="text" name="name" value="{{ user.name }}" required
                style="font-size: 1.1rem; padding: 1rem; background: rgba(0,0,0,0.3);">
        </div>

        <div class="form-group">
            <label style="color: var(--text-muted);"><i class="fa-solid fa-envelope"></i> Email Address</label>
            <input type="email" value="{{ user.email }}" readonly
                style="font-size: 1.1rem; padding: 1rem; background: rgba(0,0,0,0.1); color: var(--text-muted); cursor: not-allowed; border-color: rgba(255,255,255,0.05);">
        </div>

        <div class="form-group">
            <label style="color: var(--text-muted);"><i class="fa-solid fa-phone"></i> Phone Number</label>
            <input type="text" name="phone" value="{{ user.phone if user.phone else '' }}"
                placeholder="e.g. +91 9876543210"
                style="font-size: 1.1rem; padding: 1rem; background: rgba(0,0,0,0.3);">
        </div>

        <div class="form-group" style="margin-bottom: 2.5rem;">
            <label style="color: var(--text-muted);"><i class="fa-solid fa-car-side"></i> Contact Vehicle
                Registration</label>
            <input type="text" name="vehicle_number" value="{{ user.vehicle_number if user.vehicle_number else '' }}"
                placeholder="e.g. MH01 AB 1234"
                style="font-size: 1.1rem; padding: 1rem; background: rgba(0,0,0,0.3); text-transform: uppercase;">
        </div>

        <button type="submit" class="btn primary"
            style="width: 100%; padding: 1.2rem; font-size: 1.1rem; border-radius: 12px; box-shadow: var(--shadow-glow);"><i
                class="fa-solid fa-floppy-disk"></i> Save Profile Details</button>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const msgBox = document.getElementById('profile-msg-box');

        if (urlParams.has('msg')) {
            msgBox.style.display = 'block';
            msgBox.style.background = 'rgba(16, 185, 129, 0.2)';
            msgBox.style.color = '#86efac';
            msgBox.style.borderColor = 'rgba(16, 185, 129, 0.4)';
            msgBox.innerText = urlParams.get('msg');
        }
    });
</script>
{% endblock %}
